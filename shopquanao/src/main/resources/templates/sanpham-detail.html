<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${sanPham.name} + ' - N11NHK Shop'">Chi Tiết Sản Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap');

        body { background-color: #f9fbf9; color: #2c3e50; font-family: 'Nunito', sans-serif; display: flex; flex-direction: column; min-height: 100vh;}

        /* Dùng chung Navbar & Button Style */
        .navbar { background-color: #ffffff !important; box-shadow: 0 2px 15px rgba(0,0,0,0.04) !important; }
        .navbar-brand { color: #52796f !important; font-weight: 800; font-size: 1.6rem; }
        .nav-link { color: #555 !important; font-weight: 600; }
        .btn-theme { background-color: #84a98c; color: white; border: none; font-weight: 600; transition: 0.3s; }
        .btn-theme:hover { background-color: #52796f; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(82, 121, 111, 0.2); }
        .btn-outline-theme { border: 2px solid #84a98c; color: #84a98c; font-weight: 600; background: transparent; }

        /* Giao diện trang chi tiết */
        .product-image { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .price-tag { color: #52796f; font-size: 2.5rem; font-weight: 800; }
        .breadcrumb-item a { color: #84a98c; text-decoration: none; font-weight: 600; }
        .card-custom { background: #fff; border: 1px solid #eef2ee; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top py-2 border-bottom border-light mb-5">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-shop-window"></i> N11NHK Shop</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <a th:href="@{/cart}" class="btn btn-outline-theme rounded-circle p-2 lh-1"><i class="bi bi-bag fs-5"></i></a>
        </div>
    </div>
</nav>

<div class="container mb-5 flex-grow-1">
    <div class="row g-5 align-items-center">
        <div class="col-md-6">
            <img src="https://images.unsplash.com/photo-1434389670869-bac08581786c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
                 class="img-fluid product-image w-100" alt="Ảnh sản phẩm">
        </div>

        <div class="col-md-6">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                    <li class="breadcrumb-item active fw-bold text-secondary" th:text="${sanPham.danhMuc != null ? sanPham.danhMuc.name : 'Khác'}">Danh mục</li>
                </ol>
            </nav>

            <h1 class="fw-bold mb-3" style="color: #354f52; font-size: 2.5rem;" th:text="${sanPham.name}">Tên Sản Phẩm</h1>

            <div class="price-tag mb-4" th:text="${#numbers.formatDecimal(sanPham.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></div>

            <p class="fs-5 text-secondary mb-5 lh-lg" th:text="${sanPham.description}">Mô tả chi tiết sản phẩm sẽ nằm ở đây...</p>

            <div class="card-custom p-4">
                <form th:action="@{/cart/add}" method="POST" class="d-flex align-items-end gap-3">
                    <input type="hidden" name="productId" th:value="${sanPham.id}">

                    <div>
                        <label class="form-label text-secondary fw-bold">Số lượng</label>
                        <input type="number" name="quantity" value="1" min="1" class="form-control border-secondary-subtle fs-5 text-center" style="width: 100px; border-radius: 12px; background-color: #f9fbf9;">
                    </div>

                    <button type="submit" class="btn btn-theme btn-lg px-4 flex-grow-1 rounded-pill">
                        <i class="bi bi-bag-plus"></i> THÊM VÀO GIỎ HÀNG
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer class="py-4 text-center mt-auto" style="background-color: #e8f0e9; color: #52796f;">
    <p class="mb-0 fw-semibold">&copy; 2026 N11NHK Shop. Tôn vinh nét đẹp nhẹ nhàng.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
