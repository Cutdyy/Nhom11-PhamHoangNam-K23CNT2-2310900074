<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N11NHK - Quản Trị Hệ Thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Sidebar Styles */
        .sidebar {
            width: 260px; height: 100vh; position: fixed;
            background-color: #1e1e1e; border-right: 1px solid #333;
            transition: all 0.3s; z-index: 1000;
        }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .sidebar-link {
            padding: 15px 25px; display: flex; align-items: center;
            color: #b0b0b0; text-decoration: none; transition: 0.2s;
        }
        .sidebar-link:hover, .sidebar-link.active {
            background-color: #2d2d2d; color: #3ea6ff; border-left: 4px solid #3ea6ff;
        }
        .sidebar-link i { margin-right: 15px; font-size: 1.2rem; }

        /* Main Content Styles */
        .main-content { margin-left: 260px; padding: 30px; }
        .card-custom { background-color: #1e1e1e; border: 1px solid #333; border-radius: 12px; }
        .table { color: #e0e0e0; }
        .table-dark { --bs-table-bg: #252525; }
        .btn-add { background-color: #3ea6ff; color: white; border: none; }
        .btn-add:hover { background-color: #007bff; color: white; }

        /* Stat Cards */
        .stat-card {
            background: linear-gradient(135deg, #2c3e50, #000000);
            border-radius: 15px; padding: 20px; border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h4 class="fw-bold text-light mb-0"><i class="bi bi-shield-lock-fill"></i> N11NHK Admin</h4>
        <small class="text-muted">Quản lý cửa hàng</small>
    </div>
    <div class="mt-4">
        <a th:href="@{/admin/sanpham}" class="sidebar-link active">
            <i class="bi bi-box-seam"></i> Quản lý Sản phẩm
        </a>
        <a th:href="@{/admin/danhmuc}" class="sidebar-link">
            <i class="bi bi-tags"></i> Quản lý Danh mục
        </a>
        <a th:href="@{/admin/donhang}" class="sidebar-link">
            <i class="bi bi-receipt"></i> Quản lý Đơn hàng
        </a>
        <hr class="mx-3 border-secondary">
        <a th:href="@{/}" class="sidebar-link">
            <i class="bi bi-house-door"></i> Xem trang khách
        </a>
        <form th:action="@{/logout}" method="post" id="logoutForm">
            <a href="javascript:void(0)" onclick="document.getElementById('logoutForm').submit()" class="sidebar-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Đăng xuất
            </a>
        </form>
    </div>
</div>

<div class="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold">Danh sách Sản phẩm</h2>
            <p class="text-muted">Cập nhật và quản lý kho hàng của bạn</p>
        </div>
        <a th:href="@{/admin/sanpham/add}" class="btn btn-add px-4 py-2 fw-bold shadow">
            <i class="bi bi-plus-circle"></i> Thêm Sản Phẩm Mới
        </a>
    </div>

    <div th:if="${param.success}" class="alert alert-success bg-success text-white border-0 shadow-sm">
        <i class="bi bi-check-circle-fill"></i> Thao tác thực hiện thành công!
    </div>

    <div class="card card-custom shadow">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>Tên Sản Phẩm</th>
                    <th>Danh Mục</th>
                    <th>Giá Bán</th>
                    <th class="text-center">Hành Động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sp : ${danhSachSP}">
                    <td class="ps-4 fw-bold" th:text="${sp.id}">1</td>
                    <td class="text-info fw-semibold" th:text="${sp.name}">Tên SP</td>
                    <td>
                        <span class="badge bg-secondary px-3 py-2" th:text="${sp.danhMuc != null ? sp.danhMuc.name : 'Khác'}">DM</span>
                    </td>
                    <td class="text-warning fw-bold" th:text="${#numbers.formatDecimal(sp.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                    <td class="text-center">
                        <a href="#" class="btn btn-sm btn-outline-warning me-2"><i class="bi bi-pencil"></i> Sửa</a>
                        <a th:href="@{/admin/sanpham/delete/{id}(id=${sp.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Xác nhận xóa sản phẩm này?')">
                            <i class="bi bi-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
