<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sản Phẩm - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-success text-white p-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-box-seam"></i> Cập Nhật Sản Phẩm</h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/admin/sanpham/save}" th:object="${sanPham}" method="POST">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Tên sản phẩm</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Áo Sơ Mi Nam Công Sở" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Giá bán (VNĐ)</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" th:field="*{price}" placeholder="0" required min="0">
                                    <span class="input-group-text">đ</span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Danh mục</label>
                                <select class="form-select" th:field="*{danhMuc.id}" required>
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="dm : ${danhSachDM}"
                                            th:value="${dm.id}"
                                            th:text="${dm.name}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mô tả sản phẩm</label>
                            <textarea class="form-control" rows="4" th:field="*{description}" placeholder="Nhập chất liệu, kiểu dáng, hướng dẫn bảo quản..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                            <a th:href="@{/admin/sanpham}" class="btn btn-light border px-4">Hủy Bỏ</a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save2"></i> Lưu Dữ Liệu
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
