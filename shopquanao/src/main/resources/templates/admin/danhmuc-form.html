<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Danh Mục - N11NHK Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-success text-white p-4">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-tags"></i> Cập Nhật Danh Mục</h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/admin/danhmuc/save}" th:object="${danhMuc}" method="POST">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Tên danh mục</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Ví dụ: Áo Sơ Mi Nam" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mô tả</label>
                            <textarea class="form-control" rows="4" th:field="*{description}" placeholder="Mô tả chi tiết về loại quần áo này..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top">
                            <a th:href="@{/admin/danhmuc}" class="btn btn-light border px-4">Hủy Bỏ</a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save2"></i> Lưu Dữ Liệu
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
